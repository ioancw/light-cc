model: claude-sonnet-4-6
max_tokens: 4096
max_context_tokens: 180000
max_turns: 50
compression_threshold: 0.8

# Python executable for python_exec tool (null = auto-detect via sys.executable)
python_path: null

paths:
  skills_dirs:
    - skills
    - ~/.claude/commands
  data_dir: data
  memory_dir: data/users

server:
  host: 0.0.0.0
  port: 8000
  frontend: svelte

# Database: set DATABASE_URL env var for Postgres; SQLite is the dev fallback
# when the env var is unset. The env var ALWAYS wins over any value set here.

auth:
  registration_enabled: true
  jwt_expiry_hours: 1
  jwt_refresh_expiry_days: 7

# Available models (used by model selector and routing)
available_models:
  - claude-sonnet-4-6
  - claude-haiku-4-5-20251001
  - claude-opus-4-6

# Model routing: classify input and direct to different models for cost/latency.
# Modes:
#   off   -- always use `model` above (no routing)
#   regex -- pattern rules below, first match wins (cheap, deterministic, dumb)
#   llm   -- regex rules run first as a fast path; anything unmatched is
#            classified by a small model (`routing_classifier_model`) into
#            TRIVIAL/STANDARD/COMPLEX and dispatched per `routing_tier_models`
#
# Tiers:  Haiku (light) -> Sonnet (default) -> Opus (heavy)
routing_mode: llm
routing_classifier_model: claude-haiku-4-5-20251001
routing_tier_models:
  TRIVIAL:  claude-haiku-4-5-20251001
  STANDARD: claude-sonnet-4-6
  COMPLEX:  claude-opus-4-6
routing_rules:
  # --- Tier 1: Haiku fast path -- greetings, acknowledgements, trivial lookups ---
  # (These are safe to regex-match: never worth paying for an LLM classifier call.)
  - pattern: "^(hello|hi|hey|thanks|thank you|good morning|good afternoon)\\b"
    model: claude-haiku-4-5-20251001
  - pattern: "^(what time|what date|what day)\\b"
    model: claude-haiku-4-5-20251001
  - pattern: "^(yes|no|ok|sure|got it|sounds good|perfect)\\b"
    model: claude-haiku-4-5-20251001
  # --- No Opus fast path ---
  # The old regex rules (refactor|compare|rewrite|build a feature) were too greedy
  # and pulled ordinary requests into Opus. In llm mode, the Haiku classifier
  # decides. In regex mode, everything unmatched falls through to the default
  # (Sonnet), which is almost always the right call.
