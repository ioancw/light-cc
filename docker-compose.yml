version: "3.9"

services:
  app:
    build: .
    entrypoint: ["/bin/bash", "/app/scripts/entrypoint.sh"]
    ports:
      - "${PORT:-8000}:8000"
    environment:
      # Prefer an explicit DATABASE_URL from .env (e.g. external Postgres); else
      # fall back to the in-stack postgres service with POSTGRES_PASSWORD.
      DATABASE_URL: "${DATABASE_URL:-postgresql+asyncpg://lightcc:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}@postgres:5432/lightcc}"
      REDIS_URL: "redis://redis:6379/0"
      # JWT_SECRET is required in production. In development (ENV=development)
      # the entrypoint falls back to a stable per-deploy secret in data/.dev_jwt_secret.
      JWT_SECRET: "${JWT_SECRET:-}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      ADMIN_EMAIL: "${ADMIN_EMAIL:-}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-}"
      ADMIN_NAME: "${ADMIN_NAME:-Admin}"
      ENV: "${ENV:-production}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - app-data:/app/data
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: lightcc
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}"
      POSTGRES_DB: lightcc
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lightcc"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  app-data:
  pg-data:
  redis-data:
